name: Deploy signaling

# Manual-only for now: no push trigger, so committing signaling/ never fires a failing run
# before the Cloudflare secrets exist. Add a push trigger once the repo has a remote and the
# CLOUDFLARE_* secrets are configured.
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # wrangler-action auto-detects signaling/bun.lock and installs deps with bun, so the
      # runner needs bun on PATH (also used by the game build step below for Static Assets).
      # Version is resolved from root package.json `packageManager` (no bun-version needed).
      - uses: oven-sh/setup-bun@v2
      # Build the game into dist/ so the Worker's [assets] block has something to upload.
      - name: Build game
        run: bun install --frozen-lockfile && bun run build
      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v4
        with:
          workingDirectory: signaling
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
