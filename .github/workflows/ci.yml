name: CI

on:
  push:
    branches: [main] # guarantees main stays green after a merge (double-runs with the PR — fine at this volume)
  pull_request: # primary gate: a failing check blocks merge once required-status-checks is set

permissions:
  contents: read # least privilege; the one-time required-check setup is done from a local gh, not here

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2 # bun version resolved from root package.json `packageManager`
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run coverage
      - run: bun run build
      # Dead-code detection is informational, not a merge gate: this codebase adds exports to data
      # tables, which knip can transiently flag as unused. Surface it without blocking PRs.
      - run: bun run knip
        continue-on-error: true

  # signaling/ has its own package.json/lockfile and is excluded from the main tsc/biome/build, so a
  # type regression there would otherwise slip through. Type-check it with the root (pinned) tsc.
  signaling:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile # root — provides typescript
      - run: cd signaling && bun install --frozen-lockfile # worker deps (wrangler, workers-types)
      - run: bunx tsc --noEmit --project signaling/tsconfig.json
