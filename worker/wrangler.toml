name = "quarantine"
main = "room.ts"
compatibility_date = "2026-06-01"

# Durable Object that relays WebRTC signaling per room code.
[[durable_objects.bindings]]
name = "ROOM"
class_name = "Room"

# Global public-room registry (quick-match / browser). Single instance via idFromName("global");
# written only by Room DOs, read by GET /rooms. In-memory (no storage touched).
[[durable_objects.bindings]]
name = "REGISTRY"
class_name = "Registry"

# SQLite-backed DO classes => available on the free Workers plan (we don't use storage).
[[migrations]]
tag = "v1"
new_sqlite_classes = ["Room"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["Registry"]

# Serve the built game from this same Worker (single origin => no cross-origin / Mixed Content,
# one deploy). `directory` is relative to this file (worker/), so ../dist = repo-root dist/.
# Default routing serves an asset on a path match and falls through to the Worker `fetch` on a
# miss — so `/` and `/assets/*` are static while `/room/CODE` (WebSocket) still hits the DO.
# Deliberately NO `not_found_handling`/SPA mode: it would return index.html for unknown paths
# and break room.ts's intended 404. Static-asset requests are free/unlimited on all plans.
[assets]
directory = "../dist"
